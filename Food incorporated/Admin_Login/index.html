<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Incorporated - Staff Login</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="login-header">
        <div class="header-content-wrapper">
        <!-- The Badge -->
        <div class="logo-badge">
            <img src="../Images/Logo.png" alt="Food Incorporated Logo">
        </div>
        <h1>Food Incorporated</h1>
    </header>

    <main class="main-content">
        <div class="login-container">
            <p class="subtitle">Please login to access the menu</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <input type="email" id="username" placeholder="name@example.com" required>
                </div>

                <input type="submit" value="Sign In" class="login-btn">
            </form>

            <div class="divider">OR</div>

            <div class="social-login">
                <button type="button" class="social-btn">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="">
                    Sign in with Google
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
